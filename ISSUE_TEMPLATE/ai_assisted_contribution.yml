name: AI-Assisted Contribution Discussion
description: Discuss scope, validation, and responsibility for AI-assisted work.
title: "[AI-Assisted]: "
labels: ["ai-assisted", "needs-triage"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What are you trying to contribute?
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model or Tool
      description: Which AI model or tool do you plan to use?
  - type: textarea
    id: assisted_parts
    attributes:
      label: Assisted Parts
      description: Which parts are expected to be AI-assisted?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification Plan
      description: How will you cross-check and test the result?
    validations:
      required: true
  - type: textarea
    id: understanding
    attributes:
      label: Understanding
      description: How will you make sure you can explain the final submission?

